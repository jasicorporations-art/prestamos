<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Sin conexión - JASICORPORATIONS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; max-width: 100vw; overflow-x: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.95);
      color: #1e293b;
      border-radius: 1rem;
      padding: 2rem;
      width: 100%;
      max-width: min(400px, 100vw - 3rem);
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.25rem;
      margin-bottom: 0.75rem;
      color: #0f172a;
    }
    p {
      color: #64748b;
      line-height: 1.6;
    }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #0ea5e9;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #0284c7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Parece que no tienes conexión</h1>
    <p>Puedes seguir viendo tu ruta guardada. Cuando recuperes la conexión, la app se actualizará automáticamente.</p>
    <button onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
